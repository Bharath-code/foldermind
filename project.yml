name: FolderMind
options:
  bundleIdPrefix: app.foldermind
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
  postGenCommand: open FolderMind.xcodeproj

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: FolderMind
    INFOPLIST_KEY_NSPrincipalClass: NSApplication
    INFOPLIST_KEY_NSFullDiskAccessUsageDescription: "FolderMind needs Full Disk Access to watch and organise your folders. Your files never leave your Mac."
    CODE_SIGN_ENTITLEMENTS: FolderMind/FolderMind.entitlements
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  FolderMind:
    type: application
    platform: macOS
    sources:
      - path: FolderMind
        excludes:
          - "**/*.md"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.foldermind.mac
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
