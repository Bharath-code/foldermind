name: FolderMind
options:
  bundleIdPrefix: app.foldermind
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true
  groupSortPosition: top
  postGenCommand: xcodebuild -resolvePackageDependencies -project FolderMind.xcodeproj && open FolderMind.xcodeproj

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: "2.7.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    GENERATE_INFOPLIST_FILE: YES
    INFOPLIST_KEY_CFBundleDisplayName: FolderMind
    INFOPLIST_KEY_NSPrincipalClass: NSApplication
    INFOPLIST_KEY_NSFullDiskAccessUsageDescription: "FolderMind needs Full Disk Access to watch and organise your folders. Your files never leave your Mac."
    CODE_SIGN_ENTITLEMENTS: FolderMind/FolderMind.entitlements
    ENABLE_HARDENED_RUNTIME: YES
    COMBINE_HIDPI_IMAGES: YES
    SWIFT_EMIT_LOC_STRINGS: YES
    NSUserActivityTypes:
      - com.apple.corespotlightitem
    INFOPLIST_KEY_CFBundleURLTypes:
      - CFBundleURLSchemes: [foldermind]
        CFBundleURLName: app.foldermind.mac
    INFOPLIST_KEY_SUEnableAutomaticChecks: YES
    INFOPLIST_KEY_SUScheduledCheckInterval: 86400
    INFOPLIST_KEY_SUFeedURL: "https://foldermind.app/appcast.xml"
    INFOPLIST_KEY_SUPublicEDKey: "REPLACE_WITH_YOUR_EDDSA_PUBLIC_KEY"

targets:
  FolderMind:
    type: application
    platform: macOS
    sources:
      - path: FolderMind
        excludes:
          - "**/*.md"
    dependencies:
      - package: Sparkle
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: app.foldermind.mac
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: 1
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
      configs:
        Debug:
          DEVELOPMENT_TEAM: ""
        Release:
          DEVELOPMENT_TEAM: "XXXXXXXXXX"  # Replace with your Apple Developer Team ID

  FolderMindTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: FolderMindTests
      - path: FolderMind/Services/RuleEngine.swift
      - path: FolderMind/Services/RenameEngine.swift
      - path: FolderMind/Services/ConflictResolver.swift
      - path: FolderMind/Models/RuleModel.swift
      - path: FolderMind/Models/ActivityEntry.swift
      - path: FolderMind/Services/ToastManager.swift
      - path: FolderMind/Services/RuleStore.swift
      - path: FolderMind/Helpers/ErrorMapper.swift
      - path: FolderMind/Services/Tahoe/SpotlightIndexer.swift
      - path: FolderMind/Services/FMUndoManager.swift
    dependencies: []
